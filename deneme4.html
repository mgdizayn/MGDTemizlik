<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <title>MGD CleanOS v4.2 - Özellikli Birim</title>
   
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
   
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://unpkg.com/mqtt@5.0.3/dist/mqtt.min.js"></script>
   
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0b1220;
            --bg-2: #0f172a;
            --card: rgba(22, 27, 34, 0.92);
            --card-strong: rgba(15, 23, 42, 0.96);
            --blue: #58a6ff;
            --blue-glow: #60a5fa;
            --green: #22c55e;
            --red: #ff3b5c;
            --orange: #fb923c;
            --white: #ffffff;
            --gray-light: #cbd5e1;
            --gray: #94a3b8;
            --border: rgba(255,255,255,0.09);
            --border-strong: rgba(255,255,255,0.16);
            --ozellikli-bg: rgba(185, 28, 28, 0.88);
            --ozellikli-border: #ff3b5c;
            --ozellikli-glow: #ff6b6b;
            --shadow: 0 16px 40px rgba(0,0,0,0.35);
            --shadow-strong: 0 25px 60px rgba(255,59,92,0.25);
            --radius: 20px;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: 
                radial-gradient(circle at 20% 30%, rgba(88,166,255,0.12), transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(239,68,68,0.08), transparent 50%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
            color: var(--white);
            -webkit-font-smoothing: antialiased;
        }

        .app-shell { min-height: 100dvh; display: flex; flex-direction: column; }
        .app-main { flex: 1; padding-bottom: 170px; }

        /* ==================== HEADER ==================== */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(20px);
            background: rgba(11,18,32,0.85);
            border-bottom: 1px solid var(--border-strong);
            padding: calc(8px + env(safe-area-inset-top,0)) 16px 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .logo-wave {
            position: relative;
            min-height: 78px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wave h1 {
            font-size: clamp(2.35rem, 7vw, 3.1rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            background: linear-gradient(90deg, #ffffff, var(--blue-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 20px rgba(88,166,255,0.6),
                0 0 40px rgba(88,166,255,0.3);
            animation: logoGlow 4s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            from { text-shadow: 0 0 15px rgba(88,166,255,0.5); }
            to   { text-shadow: 0 0 45px rgba(88,166,255,0.9), 0 0 70px rgba(255,59,92,0.3); }
        }

        .status-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }

        .status {
            padding: 7px 18px;
            font-size: 13.5px;
            font-weight: 700;
            border-radius: 999px;
            border: 1px solid;
            position: relative;
            overflow: hidden;
        }

        .status::before {
            content: '●';
            margin-right: 6px;
            animation: statusDot 1.8s infinite;
        }

        @keyframes statusDot {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .status.online     { color: #4ade80; background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.4); }
        .status.offline    { color: #ff6b6b; background: rgba(255,59,92,0.12); border-color: rgba(255,59,92,0.4); }
        .status.connecting { color: #fb923c; background: rgba(251,146,60,0.12); border-color: rgba(251,146,60,0.4); }

        /* ==================== CARD & ÖZELLİKLİ ==================== */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin: 16px 12px;
            padding: 24px 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.45);
        }

        .card.ozellikli {
            background: var(--ozellikli-bg);
            border: 2px solid var(--ozellikli-border);
            box-shadow: var(--shadow-strong);
        }

        .card.ozellikli::before,
        .card.ozellikli::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: inherit;
            background: conic-gradient(from var(--ring-angle, 0deg), transparent 40%, #ff3b5c, #ff9a9a, transparent 320deg);
            opacity: 0.85;
            z-index: -1;
            animation: premiumSweep 2.8s linear infinite;
            filter: blur(8px);
        }

        .card.ozellikli::after {
            inset: -12px;
            opacity: 0.4;
            filter: blur(18px);
            animation-duration: 3.6s;
        }

        @keyframes premiumSweep {
            from { --ring-angle: 0deg; }
            to   { --ring-angle: 360deg; }
        }

        .ozellikli-uyari {
            background: rgba(255,59,92,0.18);
            border: 1px solid rgba(255,59,92,0.45);
            color: #ff9a9a;
            padding: 14px 16px;
            border-radius: 14px;
            margin: 12px 0 18px;
            font-weight: 700;
            box-shadow: 0 0 25px rgba(255,59,92,0.25);
        }

        /* ==================== BUTTONS ==================== */
        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 800;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: translateX(-150%);
            transition: transform 0.6s;
        }

        .btn:hover::after { transform: translateX(250%); }

        .btn-primary {
            background: linear-gradient(90deg, #22c55e, #4ade80);
            color: white;
            box-shadow: 0 0 25px rgba(74,222,128,0.5);
        }

        .btn-danger { background: linear-gradient(90deg, #ff3b5c, #ff6b6b); color: white; }
        .btn-blue   { background: linear-gradient(90deg, #58a6ff, #60a5fa); color: white; }

        /* ==================== FORM & QR ==================== */
        .form-input {
            background: rgba(15,23,42,0.95);
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 16px;
        }

        .form-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(88,166,255,0.25);
        }

        .qr-container, .verification-camera-box {
            background: #0a101f;
            border: 2px solid rgba(88,166,255,0.2);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }

        /* ==================== FOOTER ==================== */
        .global-footer {
            background: rgba(11,18,32,0.94);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .footer-role-track > div {
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* Diğer tüm orijinal sınıflar (modal, talimat, vs.) aynı kaldı ama renkler ve blur iyileştirildi */
        .modal-content { background: var(--card-strong); border: 1px solid var(--border-strong); }
        .verification-content { border-color: rgba(255,59,92,0.5); }
    </style>
</head>

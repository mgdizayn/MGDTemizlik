<!DOCTYPE html>

<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CleanOS</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

:root{
--bg:#0f1720;
--card:#18222c;
--primary:#2ea043;
--accent:#58a6ff;
--border:#2b3742;
--text:#e6edf3;
--muted:#8b949e;
--radius:18px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:12px;
padding:16px;
border-bottom:1px solid var(--border);
}

.logo{
width:38px;
height:38px;
}

.title{
font-size:18px;
font-weight:600;
}

.subtitle{
font-size:12px;
color:var(--muted);
}

/* PAGE */

.page{
padding:16px;
animation:fade .25s;
}

.hidden{display:none;}

@keyframes fade{
from{opacity:0;transform:translateY(5px);}
to{opacity:1;}
}

/* CARD */

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:22px;
margin-bottom:18px;
box-shadow:0 8px 20px rgba(0,0,0,.4);
}

/* INPUT */

.input{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid var(--border);
background:#0f1720;
color:white;
font-size:18px;
text-align:center;
margin-top:12px;
}

/* BUTTON */

.btn{
width:100%;
height:56px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:16px;
transition:.2s;
}

.btn:active{transform:scale(.97);}

.btn-primary{
background:linear-gradient(135deg,#2ea043,#238636);
color:white;
}

.btn-secondary{
background:#2b3742;
color:white;
}

/* QR CAMERA */

.qr-box{
width:100%;
height:320px;
border-radius:16px;
overflow:hidden;
background:black;
position:relative;
margin-top:16px;
}

.scan-frame{
position:absolute;
top:50%;
left:50%;
width:220px;
height:220px;
transform:translate(-50%,-50%);
border:3px solid var(--accent);
border-radius:16px;
box-shadow:0 0 0 2000px rgba(0,0,0,.55);
pointer-events:none;
}

.scan-line{
position:absolute;
width:100%;
height:3px;
background:#00ff88;
animation:scan 2s linear infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

/* USER CARD */

.user{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

.user-name{
font-weight:600;
}

.user-role{
font-size:12px;
color:var(--muted);
}

/* STATUS */

.status{
text-align:center;
font-size:13px;
color:#2ea043;
padding:6px;
}

/* FOOTER */

.footer{
margin-top:auto;
text-align:center;
padding:14px;
font-size:11px;
color:#6e7681;
border-top:1px solid var(--border);
}

</style>

</head>

<body>

<header class="header">

<svg class="logo" viewBox="0 0 100 100">
<rect x="10" y="10" width="80" height="80" rx="18" fill="#2ea043"/>
<path d="M35 55 L48 70 L70 35"
stroke="white"
stroke-width="8"
fill="none"/>
</svg>

<div>
<div class="title">CleanOS</div>
<div class="subtitle">Temizlik Yönetim Sistemi</div>
</div>

</header>

<div class="status">Sistem hazır</div>

<!-- LOGIN -->

<section id="page-login" class="page">

<div class="card">

<h2>Personel Girişi</h2>

<input id="tc" maxlength="11" placeholder="TC Kimlik No" class="input"/>

<button class="btn btn-primary" onclick="login()">
Giriş Yap
</button>

</div>

</section>

<!-- QR PAGE -->

<section id="page-qr" class="page hidden">

<div class="card">

<div class="user">

<div>
<div class="user-name">Personel</div>
<div class="user-role">Temizlik Görevlisi</div>
</div>

<button class="btn-secondary btn" style="width:110px;height:40px;margin:0" onclick="logout()">
Çıkış
</button>

</div>

<h3>QR Kod Okut</h3>

<div id="reader" class="qr-box">

<div class="scan-frame">
<div class="scan-line"></div>
</div>

</div>

</div>

</section>

<footer class="footer">

CleanOS
Nazilli Devlet Hastanesi
Bilgi İşlem

</footer>

<script>

let scanner

function login(){

const tc=document.getElementById("tc").value

if(tc.length!==11){
alert("TC 11 haneli olmalı")
return
}

document.getElementById("page-login").classList.add("hidden")
document.getElementById("page-qr").classList.remove("hidden")

startScanner()

}

async function startScanner(){

scanner=new Html5Qrcode("reader")

await scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(code)=>{
alert("QR okundu: "+code)
}
)

}

function logout(){
location.reload()
}

</script>

</body>
</html>
